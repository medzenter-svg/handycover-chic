name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prerender every sitemap URL
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import { copyFile, mkdir, readFile, writeFile } from 'node:fs/promises'
          import { dirname, join } from 'node:path'
          import * as workerModule from './.output/server/index.mjs'

          const worker = workerModule.default ?? workerModule
          const fetchHandler = worker.fetch ?? workerModule.fetch

          if (typeof fetchHandler !== 'function') {
            console.error('Available exports:', Object.keys(workerModule))
            throw new Error('Could not find a fetch handler in the built server module')
          }

          const sitemap = await readFile('public/sitemap.xml', 'utf8')
          const urls = [...sitemap.matchAll(/<loc>(.*?)<\/loc>/g)].map((match) => match[1])

          if (urls.length === 0) {
            throw new Error('No URLs found in public/sitemap.xml')
          }

          const ctx = {
            waitUntil() {},
            passThroughOnException() {},
          }

          for (const urlString of urls) {
            const url = new URL(urlString)
            const response = await fetchHandler(new Request(url), {}, ctx)

            if (!response.ok) {
              throw new Error(`SSR request failed for ${url.pathname} with status ${response.status}`)
            }

            const html = await response.text()
            const relativePath = url.pathname === '/'
              ? 'index.html'
              : join(url.pathname.replace(/^\//, '').replace(/\/$/, ''), 'index.html')
            const outputPath = join('.output/public', relativePath)

            await mkdir(dirname(outputPath), { recursive: true })
            await writeFile(outputPath, html, 'utf8')
            console.log(`Prerendered ${url.pathname} -> ${outputPath}`)
          }

          await copyFile('.output/public/index.html', '.output/public/404.html')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
